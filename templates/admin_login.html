<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Lost & Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <style>
        body {
            background-color: #f4f7f6;
            margin: 0;
        }

        .auth-page-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-box-container {
            width: 100%;
            max-width: 480px;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
            border-top: 5px solid var(--primary);
        }

        .input-group {
            text-align: right;
            margin-bottom: 20px;
        }

            .input-group label {
                display: block;
                font-weight: 600;
                margin-bottom: 8px;
                color: var(--dark);
            }

            .input-group input {
                width: 100%;
                box-sizing: border-box;
                padding: 12px 15px;
                border-radius: 10px;
                border: 1px solid #ddd;
                background-color: #fcfcfc;
                font-size: 15px;
            }

        .btn-primary-custom {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body data-lang="ar">

    <div class="auth-page-wrapper">
        <div class="auth-box-container">

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div style="color: #e74c3c; background: #fdeaea; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; font-size: 14px;">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <div style="background: var(--primary); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto;">
                <i class="fa-solid fa-user-shield" style="font-size: 30px; color: var(--secondary);"></i>
            </div>

            <h2 style="color: var(--primary); margin-bottom: 25px; font-weight: 800;">بوابة الإدارة</h2>

            <form action="{{ url_for('admin_login') }}" method="POST">
                <div class="input-group">
                    <label>الرقم الوظيفي للمدير (Admin ID)</label>
                    <input type="text" id="adminId" name="adminId" placeholder="مثال: 1001" required autofocus>
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="adminPass" name="adminPass" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary-custom">دخول للوحة التحكم</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <script>
        // بس بنخلي كود منع الحروف في الـ ID عشان يضل الشغل بروفيشنال
        document.getElementById('adminId').addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
