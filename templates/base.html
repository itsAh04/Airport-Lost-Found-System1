<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">

    <title>{% block title %}Lost & Found System{% endblock %}</title>
</head>

<body data-lang="ar">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-semibold text-primary" href="{{ url_for('user_home') }}">
                <i class="fa-solid fa-box-open me-2"></i>
                <span data-i18n="nav_brand">Lost & Found System</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-4">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('user_home') }}" data-i18n="nav_home">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('lost_report') }}" data-i18n="nav_report_lost">بلاغ مفقود</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('found_report') }}" data-i18n="nav_report_found">بلاغ معثور</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-sm btn-outline-secondary lang-toggle text-only fw-bold">EN</button>
                    <a href="{{ url_for('logout') }}" class="btn btn-sm btn-danger"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-fill">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="pt-5 pb-3 bg-light mt-auto">
        <div class="container">
            <div class="text-center small" data-i18n="footer_rights">
                © 2026 Lost & Found Management System. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
</body>
</html>
