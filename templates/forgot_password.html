<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Lost & Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
</head>
<body data-lang="ar">

    <div class="auth-page-wrapper">
        <div class="top-buttons-auth">
            <a href="{{ url_for('login') }}" class="top-btn-auth" title="عودة">
                <i class="fa-solid" id="backIcon"></i>
            </a>
            <button class="top-btn-auth lang-toggle text-only">EN</button>
        </div>

        <div class="auth-box-container">
            <h2 data-i18n="auth_forgot_title" style="color: var(--primary); margin-bottom: 15px; font-weight: 800;">استعادة كلمة المرور</h2>
            <p data-i18n="auth_forgot_desc" style="color: #7f8c8d; font-size: 14px; margin-bottom: 25px;">أدخل بريدك الإلكتروني وسنقوم بإرسال رابط التحقق إليك.</p>

            <form action="{{ url_for('forgot_password') }}" method="POST">
                <div class="input-group">
                    <label data-i18n="auth_email">البريد الإلكتروني</label>
                    <input type="email" name="email" data-i18n="auth_email_ph" placeholder="example@airport.com" required>
                </div>
                <button type="submit" class="btn-primary-custom" data-i18n="auth_btn_send" style="margin-top: 15px; font-size: 16px;">إرسال الرابط</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <script>
        // كود صغير عشان أيقونة السهم تتقلب حسب اللغة
        document.addEventListener("DOMContentLoaded", () => {
            const updateIcon = () => {
                const icon = document.getElementById('backIcon');
                const isEn = document.body.getAttribute('data-lang') === 'en';
                icon.className = isEn ? 'fa-solid fa-arrow-left' : 'fa-solid fa-arrow-right';
            };
            updateIcon();
            document.querySelector('.lang-toggle').addEventListener('click', () => setTimeout(updateIcon, 50));
        });
    </script>
</body>
</html>
