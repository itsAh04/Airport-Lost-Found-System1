<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_lost">Lost Storage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/lost_storage.css') }}">
</head>
<body data-lang="ar">

    <div class="sidebar">
        <h2 data-i18n="nav_dash_title">Dashboard</h2>
        <ul>
            <li><a href="{{ url_for('lost_reports_admin') }}" class="active"><i class="fa-solid fa-box"></i> <span data-i18n="nav_lost">Lost Storage</span></a></li>
            <li><a href="{{ url_for('found_reports_admin') }}"><i class="fa-solid fa-warehouse"></i> <span data-i18n="nav_found">Found Storage</span></a></li>
            <li><a href="{{ url_for('matches') }}"><i class="fa-solid fa-robot"></i> <span data-i18n="nav_matches">AI Matches</span></a></li>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            <li><a href="#" class="lang-toggle"><i class="fa-solid fa-globe"></i> English</a></li>
            <li><a href="#" class="theme-toggle"><i class="fa-solid fa-moon"></i> <span data-i18n="theme_dark">Dark Mode</span></a></li>
        </ul>
    </div>

    <div class="main-content" id="mainContent">
        <header class="admin-header d-flex justify-content-between align-items-center mb-4">
            <h2 data-i18n="lost_admin_title">🏷️ Lost Storage</h2>
            <div class="notifications">
                <i class="fa-solid fa-bell"></i>
                <span class="badge bg-danger" id="notifCount">4</span>
            </div>
        </header>

        <div class="card filter-card p-3 shadow-sm mb-4">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label" data-i18n="lbl_location">Location</label>
                    <select id="locationFilter" class="form-select">
                        <option value="" data-i18n="opt_all">All</option>
                        <option value="Terminal A">Terminal A</option>
                        <option value="Lounge">Lounge</option>
                        <option value="Gate 12">Gate 12</option>
                        <option value="Storage Room 2">Storage Room 2</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label" data-i18n="lbl_category">Category</label>
                    <select id="categoryFilter" class="form-select">
                        <option value="" data-i18n="opt_all">All</option>
                        <option value="Bags" data-i18n="cat_opt_bags">Bags</option>
                        <option value="Electronics" data-i18n="cat_opt_elec">Electronics</option>
                        <option value="Documents" data-i18n="cat_opt_docs">Documents</option>
                        <option value="Clothes" data-i18n="cat_opt_clothes">Clothes</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label" data-i18n="lbl_date_from">Date From</label>
                    <input type="date" id="dateFrom" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label" data-i18n="lbl_date_to">Date To</label>
                    <input type="date" id="dateTo" class="form-control">
                </div>
                <div class="col-md-6 mt-3">
                    <label class="form-label" data-i18n="lbl_keyword">Keyword</label>
                    <input type="text" id="keywordFilter" class="form-control" data-i18n="ph_search" placeholder="Search...">
                </div>
            </div>
            <div class="mt-3 text-end">
                <button id="resetFilters" class="btn btn-outline-secondary btn-sm" data-i18n="btn_reset">Reset Filters</button>
                <button id="exportBtn" class="btn btn-outline-success btn-sm" data-i18n="btn_export_csv">Export CSV</button>
                <button id="exportExcelBtn" class="btn btn-outline-primary btn-sm" data-i18n="btn_export_excel">Export Excel</button>
            </div>
        </div>

        <div id="reportsContainer">
            <div class="card p-3 mb-2 shadow-sm" data-location="Storage Room 2" data-category="Bags" data-date="2026-03-02">
                <h5 class="reportTitle"><span data-i18n="lost_prefix">Lost:</span> Black Bag</h5>
                <p><strong data-i18n="lbl_location">Location:</strong> Storage Room 2</p>
                <p><strong data-i18n="lbl_category">Category:</strong> <span data-i18n="cat_opt_bags">Bags</span></p>
                <p><strong data-i18n="lbl_date">Date:</strong> 2/3/2026</p>
                <p><strong data-i18n="lbl_desc">Description:</strong> Medium-sized black bag with red tag.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <script src="{{ url_for('static', filename='js/lost_storage.js') }}"></script>
</body>
</html>
