<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Lost & Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <style>
        body {
            background-color: #f4f7f6;
            margin: 0;
        }

        .auth-page-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-box-container {
            width: 100%;
            max-width: 480px;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
            position: relative;
        }

        /* 🚨 تنسيق اللوجو الدائري 🚨 */
        .logo-container {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 3px solid var(--secondary);
            overflow: hidden;
        }

            .logo-container img {
                max-height: 70%;
                width: auto;
            }

        .input-group {
            text-align: right;
            margin-bottom: 20px;
        }

            .input-group input {
                width: 100%;
                box-sizing: border-box;
                padding: 12px 15px;
                border-radius: 10px;
                border: 1px solid #ddd;
                background-color: #fcfcfc;
                font-size: 15px;
                transition: 0.3s;
            }

                .input-group input:focus {
                    border-color: var(--secondary, #d4af37);
                    outline: none;
                    background-color: white;
                    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
                }

        .passwords-row {
            display: flex;
            gap: 15px;
            width: 100%;
        }

            .passwords-row .input-group {
                width: 50%;
                margin-bottom: 20px;
            }

        .password-wrapper {
            position: relative;
        }

            .password-wrapper i {
                position: absolute;
                left: 15px;
                top: 50%;
                transform: translateY(-50%);
                color: gray;
                cursor: pointer;
            }

        .btn-primary-custom {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .passwords-row {
                flex-direction: column;
                gap: 0;
            }

                .passwords-row .input-group {
                    width: 100%;
                }

            .auth-box-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body data-lang="ar">

    <div class="auth-page-wrapper">
        <div class="top-buttons-auth" style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;">
            <a href="{{ url_for('login') }}" class="top-btn-auth" title="الرئيسية"><i class="fa-solid fa-house"></i></a>
            <button class="top-btn-auth lang-toggle text-only">EN</button>
        </div>

        <div class="auth-box-container">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='logo.jpg') }}"
                     onerror="this.onerror=null; this.src='https://i.postimg.cc/MTQwFp6T/Whats-App-Image-2026-03-06-at-1-02-33-AM.jpg';"
                     alt="Logo">
            </div>

            <h3 data-i18n="auth_reg_title" style="color: var(--primary); margin-bottom: 25px; font-weight: 800;">إنشاء حساب جديد</h3>

            <form action="{{ url_for('register_user') }}" method="POST">
                <div class="input-group">
                    <label data-i18n="auth_name" style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark);">الاسم الكامل</label>
                    <input type="text" name="fullname" id="fullnameInput" data-i18n="auth_name_ph" placeholder="أحمد محمد"
                           pattern="^[\u0600-\u06FFa-zA-Z\s]+$"
                           title="يرجى إدخال أحرف عربية أو إنجليزية فقط"
                           required>
                </div>
                <div class="input-group">
                    <label data-i18n="auth_email" style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark);">البريد الإلكتروني</label>
                    <input type="email" name="email" data-i18n="auth_email_ph" placeholder="example@airport.com" required>
                </div>

                <div class="passwords-row">
                    <div class="input-group">
                        <label data-i18n="auth_pass" style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark);">كلمة المرور</label>
                        <div class="password-wrapper">
                            <input type="password" name="password" data-i18n="auth_pass_ph" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye toggle-password"></i>
                        </div>
                    </div>
                    <div class="input-group">
                        <label data-i18n="auth_pass_conf" style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark);">تأكيد المرور</label>
                        <div class="password-wrapper">
                            <input type="password" name="confirm_password" data-i18n="auth_pass_ph" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye toggle-password"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-primary-custom" data-i18n="auth_btn_reg" style="background-color: var(--primary); color: white; border: none; font-weight: bold;">تسجيل حساب</button>
            </form>

            <div class="auth-links" style="justify-content: center; margin-top: 20px;">
                <a href="{{ url_for('login') }}" data-i18n="auth_have_acc" style="color: var(--primary); font-weight: 600; text-decoration: none;">لديك حساب بالفعل؟ تسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
</body>
</html>
